apiVersion: v1
kind: Secret
metadata:
  name: db-credentials
  namespace: production
type: Opaque
stringData:
  MYSQL_ROOT_PASSWORD: "root"
  MYSQL_DB_PASSWORD: "root"

---

apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: production
data:
  DB_NAME: "demodb"
  DB_USER: "app_user"
  DB_HOST: "mysql-service.production.svc.cluster.local"
  DB_PORT: "3306"
  SERVER_PORT: "3001"
  SERVER_URL: "http://0.0.0.0:3001"